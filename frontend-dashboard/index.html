<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket System Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  
  <div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">
    <header class="glass-panel header-panel">
      <h1>Cosmic Tickets <span>Dashboard</span></h1>
      <p>Real-time booking platform overview</p>
    </header>

    <div class="dashboard-grid">
      
      <!-- Stats Panel -->
      <section class="glass-panel stats-panel">
        <div class="stats-icon">🎟️</div>
        <div class="stats-info">
          <h3>Total Tickets Booked</h3>
          <h2 id="totalTicketsEl">--</h2>
        </div>
      </section>

      <!-- Booking Form -->
      <section class="glass-panel boook-panel">
        <h2>Book a New Ticket</h2>
        <form id="bookTicketForm">
          <div class="input-group">
            <label for="userId">User ID</label>
            <input type="text" id="userId" placeholder="Enter User ID (e.g. USER01)" required autocomplete="off" />
          </div>
          <div class="input-group">
            <label for="seatNumber">Seat Number</label>
            <input type="text" id="seatNumber" placeholder="Enter Seat (e.g. A01)" required autocomplete="off" />
          </div>
          <button type="submit" class="btn-primary">
            <span class="btn-text">Confirm Booking</span>
            <div class="loader" id="submitLoader"></div>
          </button>
        </form>
        <div id="bookingStatus" class="status-msg hidden"></div>
      </section>

      <!-- Recent Tickets -->
      <section class="glass-panel list-panel">
        <div class="list-header">
          <h2>Recent Bookings</h2>
          <button class="btn-icon" id="refreshBtn" title="Refresh">🔄</button>
        </div>
        <div class="table-container">
          <table class="modern-table">
            <thead>
              <tr>
                <th>Ticket ID</th>
                <th>User ID</th>
                <th>Seat Number</th>
                <th>Timestamp</th>
              </tr>
            </thead>
            <tbody id="ticketListBody">
              <!-- Tickets will be injected here -->
            </tbody>
          </table>
        </div>
      </section>

    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
